name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Run lint
        run: pnpm lint

  deploy:
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Get commit info
        id: commit-info
        run: |
          commit_message="$(git log -1 --pretty=%s)"
          echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "commit_message=$commit_message" >> $GITHUB_OUTPUT
          echo "commit_message_b64=$(printf '%s' "$commit_message" | base64 | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Dispatch deploy to Hetzner
        env:
          HETZNER_SSH_USER: ${{ secrets.HETZNER_SSH_USER }}
          HETZNER_SSH_PORT: ${{ secrets.HETZNER_SSH_PORT }}
          HETZNER_REPO_DIR: ${{ vars.HETZNER_REPO_DIR }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          SSH_USER=${HETZNER_SSH_USER:-deploy}
          SSH_PORT=${HETZNER_SSH_PORT:-22}
          REPO_DIR=${HETZNER_REPO_DIR:-/opt/hack/repo}
          ARCHIVE_PATH=/tmp/hack-deploy-${GITHUB_SHA:0:7}.tgz
          echo "${{ secrets.HETZNER_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          tar --exclude-vcs --exclude=node_modules -czf "$ARCHIVE_PATH" .
          scp -o StrictHostKeyChecking=no -P "$SSH_PORT" -i /tmp/deploy_key "$ARCHIVE_PATH" "$SSH_USER"@${{ secrets.HETZNER_HOST }}:/tmp/hack-deploy.tgz
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" -i /tmp/deploy_key "$SSH_USER"@${{ secrets.HETZNER_HOST }} "REPO_DIR='$REPO_DIR' DEPLOY_SHA='$GITHUB_SHA' DEPLOY_REPO='${{ github.repository }}' DEPLOY_COMMIT_MESSAGE_B64='${{ steps.commit-info.outputs.commit_message_b64 }}' SLACK_BOT_TOKEN='$SLACK_BOT_TOKEN' SLACK_CHANNEL='$SLACK_CHANNEL' CLOUDFLARE_ZONE_ID='$CLOUDFLARE_ZONE_ID' CLOUDFLARE_API_TOKEN='$CLOUDFLARE_API_TOKEN' bash -s" << 'DEPLOY'
            set -euo pipefail
            mkdir -p "$REPO_DIR"
            find "$REPO_DIR" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
            tar -xzf /tmp/hack-deploy.tgz -C "$REPO_DIR"
            rm -f /tmp/hack-deploy.tgz
            nohup env REPO_DIR="$REPO_DIR" ENV_FILE="$REPO_DIR/.env" SKIP_GIT_SYNC=1 DEPLOY_SHA="$DEPLOY_SHA" DEPLOY_REPO="$DEPLOY_REPO" DEPLOY_COMMIT_MESSAGE_B64="$DEPLOY_COMMIT_MESSAGE_B64" SLACK_BOT_TOKEN="$SLACK_BOT_TOKEN" SLACK_CHANNEL="$SLACK_CHANNEL" CLOUDFLARE_ZONE_ID="$CLOUDFLARE_ZONE_ID" CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN" bash "$REPO_DIR/scripts/deploy-production.sh" > "$REPO_DIR/.deploy.log" 2>&1 < /dev/null &
            echo "Started deploy in background with PID $!"
          DEPLOY
          rm -f /tmp/deploy_key
          rm -f "$ARCHIVE_PATH"
