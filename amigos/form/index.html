<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>amigos — postular</title>
<meta name="description" content="Postulá al micro grant fund de amigos." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #465A40;
    --ink: #FFFFFF;
    --muted: rgba(255,255,255,0.7);
    --faint: rgba(255,255,255,0.4);
    --border: rgba(255,255,255,0.25);
    --tile: rgba(255,255,255,0.08);
  }
  html, body { background: var(--bg); color: var(--ink); }
  ::selection { background: #FF9500; color: var(--bg); }
  ::-moz-selection { background: #FF9500; color: var(--bg); }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .font-mono-ui { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }

  .text-neutral-500 { color: var(--muted) !important; }
  .text-neutral-400 { color: var(--faint) !important; }
  .text-neutral-300 { color: var(--faint) !important; }
  .text-neutral-800 { color: var(--ink) !important; }
  .border-neutral-200 { border-color: var(--border) !important; }

  .field {
    width: 100%;
    background: transparent;
    color: var(--ink);
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 150ms ease;
  }
  .field::placeholder { color: var(--faint); }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  .field:focus { border-bottom-color: var(--ink); }
  textarea.field { resize: vertical; min-height: 96px; line-height: 1.5; }
  select.field {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='white' stroke-width='1.5' d='M1 1.5l5 5 5-5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 0 center;
    padding-right: 20px;
  }
  select.field option { color: #0F0E0C; background: #FFFFFF; }

  .label {
    display: block;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .mini-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.02em;
    color: var(--ink); background: transparent;
    border: none; padding: 0; line-height: 1;
    text-decoration: none; cursor: pointer;
    transition: opacity 150ms ease;
  }
  .mini-btn:hover { color: #FF9500 !important; }
  a { transition: color 150ms ease; }
  a:hover, a:hover * { color: #FF9500 !important; }

  .crosshair-coords {
    position: fixed; z-index: 50; pointer-events: none; display: none;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px; color: var(--ink);
  }
  @media (min-width: 768px) {
    .crosshair-coords { display: block; }
  }
</style>
</head>
<body>

<main class="min-h-screen pt-24 pb-32">
  <div class="mx-auto max-w-[500px] px-6">
    <h1 class="text-3xl font-medium tracking-tight">Postulá al fondo</h1>
    <p class="mt-4 text-sm text-neutral-500">
      Pequeños cheques, sin formularios largos. Contanos qué estás construyendo y por qué este empujón te cambia el próximo mes. Te respondemos en menos de 7 días.
    </p>

    <!-- Form -->
    <form id="apply-form" class="mt-12 flex flex-col gap-6" novalidate>
      <div>
        <label class="label" for="f-name">Nombre</label>
        <input class="field" type="text" id="f-name" name="name" required placeholder="Cómo te llamás" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label" for="f-age">Edad</label>
          <input class="field" type="number" id="f-age" name="age" min="13" max="99" required placeholder="00" />
        </div>
        <div>
          <label class="label" for="f-location">Dónde vivís</label>
          <input class="field" type="text" id="f-location" name="location" placeholder="Ciudad, país" />
        </div>
      </div>

      <div>
        <label class="label" for="f-email">Email</label>
        <input class="field" type="email" id="f-email" name="email" required placeholder="vos@email.com" />
      </div>

      <div>
        <label class="label" for="f-link">Link a vos (LinkedIn, X, sitio)</label>
        <input class="field" type="url" id="f-link" name="link" placeholder="https://" />
      </div>

      <div>
        <label class="label" for="f-project">¿Qué estás construyendo?</label>
        <textarea class="field" id="f-project" name="project" required placeholder="Una idea, un prototipo, un producto. Lo que sea — contanos en pocas palabras."></textarea>
      </div>

      <div>
        <label class="label" for="f-why">¿Por qué ahora? ¿Qué destrabás con este grant?</label>
        <textarea class="field" id="f-why" name="why" placeholder="El dominio, la primera versión, un fin de semana sin trabajar — cualquier cosa cuenta."></textarea>
      </div>

      <div>
        <label class="label" for="f-video">Mandanos un video corto sobre un tema que te apasiona</label>
        <input class="field" type="url" id="f-video" name="video" placeholder="https:// (YouTube, Loom, Vimeo, lo que sea)" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label" for="f-amount">¿Cuánto necesitás?</label>
          <select class="field" id="f-amount" name="amount" required>
            <option value="" disabled selected>Elegí un monto</option>
            <option value="100">USD 100</option>
            <option value="250">USD 250</option>
            <option value="500">USD 500</option>
            <option value="1000">USD 1.000</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div>
          <label class="label" for="f-referral">¿Cómo nos conociste?</label>
          <input class="field" type="text" id="f-referral" name="referral" placeholder="Un amigo, Twitter, un link..." />
        </div>
      </div>

      <div class="mt-4 flex items-center justify-between gap-4">
        <a href="../" class="mini-btn"><span aria-hidden="true">[←]</span> Inicio</a>
        <button type="submit" class="mini-btn">Enviar <span aria-hidden="true">[↗]</span></button>
      </div>

      <p id="form-feedback" class="text-sm text-neutral-400 hidden"></p>
    </form>
  </div>
</main>

<!-- Cursor coords -->
<span id="ch-coords" class="crosshair-coords"><span id="ch-x"></span><span id="ch-y" class="block"></span></span>

<!-- Footer -->
<footer class="fixed bottom-0 z-[70] flex w-full items-center justify-between px-6 py-4 font-mono-ui" style="background: var(--bg);">
  <a href="../" class="mini-btn"><span aria-hidden="true">[←]</span> Inicio</a>
  <div class="hidden gap-6 md:flex">
    <a href="mailto:hola@amigos.sh" class="text-xs uppercase underline">Contacto</a>
    <a href="https://x.com/" target="_blank" rel="noopener noreferrer" class="text-xs uppercase underline">Twitter</a>
  </div>
  <span id="time-scl" class="text-xs uppercase">SCL --:--:--</span>
</footer>

<script>
  function fmt(date, tz) {
    const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true, timeZone: tz };
    return new Intl.DateTimeFormat('en-US', opts).format(date).replace(/\s/g, ' ');
  }
  function tick() {
    document.getElementById('time-scl').textContent = 'SCL ' + fmt(new Date(), 'America/Santiago');
  }
  tick(); setInterval(tick, 1000);

  // Cursor coords
  const coords = document.getElementById('ch-coords');
  const cx = document.getElementById('ch-x');
  const cy = document.getElementById('ch-y');
  const pad = (n, len) => String(n).padStart(len, '0');
  window.addEventListener('mousemove', (e) => {
    const x = e.clientX, y = e.clientY;
    coords.style.left = (x + 16) + 'px';
    coords.style.top = (y + 16) + 'px';
    cx.textContent = 'X:' + pad(x, 4);
    cy.textContent = 'Y:' + pad(y, 4);
  });

  // Form: build mailto on submit (placeholder backend)
  const form = document.getElementById('apply-form');
  const feedback = document.getElementById('form-feedback');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.name || !data.email || !data.project) {
      feedback.textContent = 'Completá nombre, email y qué estás construyendo.';
      feedback.classList.remove('hidden');
      return;
    }
    const subject = encodeURIComponent(`postulación — ${data.name}`);
    const body = encodeURIComponent(
      `Nombre: ${data.name}\n` +
      `Edad: ${data.age || '-'}\n` +
      `Ubicación: ${data.location || '-'}\n` +
      `Email: ${data.email}\n` +
      `Link: ${data.link || '-'}\n` +
      `Monto: ${data.amount || '-'}\n` +
      `Referral: ${data.referral || '-'}\n\n` +
      `Qué construye:\n${data.project}\n\n` +
      `Por qué ahora:\n${data.why || '-'}\n\n` +
      `Video (tema que le apasiona): ${data.video || '-'}\n`
    );
    window.location.href = `mailto:hola@amigos.sh?subject=${subject}&body=${body}`;
    feedback.textContent = 'Abriendo tu cliente de email...';
    feedback.classList.remove('hidden');
  });
</script>

</body>
</html>
