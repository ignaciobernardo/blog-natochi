        var cachedToken = null;
        var tokenExpiry = 0;

        function getToken() {
            if (cachedToken && Date.now() < tokenExpiry) {
                return Promise.resolve(cachedToken);
            }
            return fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET),
                },
                body: 'grant_type=refresh_token&refresh_token=' + encodeURIComponent(REFRESH_TOKEN),
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                cachedToken = data.access_token;
                tokenExpiry = Date.now() + (data.expires_in - 60) * 1000;
                return cachedToken;
            });
        }

        var pollInterval = 30000; // 30 seconds

        function updateTrack() {
            getToken()
            .then(function (token) {
                return fetch('https://api.spotify.com/v1/me/player/recently-played?limit=1', {
                    headers: { 'Authorization': 'Bearer ' + token },
                });
            })
            .then(function (r) {
                if (r.status === 429) {
                    var retry = parseInt(r.headers.get('Retry-After') || '300', 10);
                    setTimeout(updateTrack, retry * 1000);
                    return null;
                }
                return r.json();
            })
            .then(function (data) {
                if (!data) return;
                if (data.items && data.items.length > 0) {
                    var track = data.items[0].track;
                    var name  = track.name;
                    var artist = track.artists.map(function (a) { return a.name; }).join(', ');

                    pill.innerHTML = 'listening to: ' + name + ' - ' + artist + ' &#8599;';

                    pill.onclick = function () { window.open(url, '_blank'); };
                }
            })
            .catch(function () {
                pill.textContent = 'listening to: offline';
            });
        }

        updateTrack();
        setInterval(updateTrack, pollInterval);
    })();

    <script>
    (function () {
        // ─── Config ───────────────────────────────────────────────────────────
        const LERP_SPEED   = 0.055;

        // Desktop: parallax offsets + factors
        const DESKTOP_CONFIGS = [
            { id: 'node-blog',   lineId: 'line-0', factor: 0.055, bx:  0.26, by: -0.22 },
            { id: 'node-about',  lineId: 'line-1', factor: 0.040, bx: -0.30, by: -0.07 },
            { id: 'node-latest', lineId: 'line-2', factor: 0.065, bx:  0.14, by:  0.24 },
        ];

        // Mobile: static positions, no parallax
        const MOBILE_CONFIGS = [
            { id: 'node-blog',   lineId: 'line-0', factor: 0, bx:  0.06, by: -0.30 },
            { id: 'node-about',  lineId: 'line-1', factor: 0, bx:  0.22, by:  0.28 },
            { id: 'node-latest', lineId: 'line-2', factor: 0, bx: -0.36, by:  0.20 },
        ];

        function isMobile() { return window.innerWidth < 768; }

        // ─── State ────────────────────────────────────────────────────────────
        let mouse = { x: 0, y: 0 };

        const rootEl = document.getElementById('root-node');

        function buildNodes() {
            const cfgs = isMobile() ? MOBILE_CONFIGS : DESKTOP_CONFIGS;
            return cfgs.map(cfg => ({
                el:     document.getElementById(cfg.id),
                lineEl: document.getElementById(cfg.lineId),
                factor: cfg.factor,
                bx: cfg.bx, by: cfg.by,
                cx: 0, cy: 0,
            }));
        }

        let nodes = buildNodes();

        // ─── Helpers ──────────────────────────────────────────────────────────
        function lerp(a, b, t) { return a + (b - a) * t; }

        function getCenter() {
            return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        }

        function initPositions() {
            const c = getCenter();
            nodes.forEach(n => {
                n.cx = c.x + n.bx * window.innerWidth;
                n.cy = c.y + n.by * window.innerHeight;
            });
        }

        // ─── Render loop ──────────────────────────────────────────────────────
        function tick() {
            const c  = getCenter();
            const mx = mouse.x - c.x;
            const my = mouse.y - c.y;

            rootEl.style.left = c.x + 'px';
            rootEl.style.top  = c.y + 'px';

            const rx = c.x;
            const ry = c.y;

            nodes.forEach(n => {
                const tx = c.x + n.bx * window.innerWidth  + mx * n.factor;
                const ty = c.y + n.by * window.innerHeight + my * n.factor;

                n.cx = lerp(n.cx, tx, LERP_SPEED);
                n.cy = lerp(n.cy, ty, LERP_SPEED);

                n.el.style.left = n.cx + 'px';
                n.el.style.top  = n.cy + 'px';

                n.lineEl.setAttribute('x1', rx);
                n.lineEl.setAttribute('y1', ry);
                n.lineEl.setAttribute('x2', n.cx);
                n.lineEl.setAttribute('y2', n.cy);
            });

            rafId = requestAnimationFrame(tick);
        }

        // ─── Init ─────────────────────────────────────────────────────────────
        document.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Touch support
        document.addEventListener('touchmove', e => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('resize', () => {
            nodes = buildNodes();
            initPositions();
        });

        initPositions();
        tick();
    }());
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const canvas = document.getElementById('dither-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
    renderer.setPixelRatio(1);
    renderer.setClearColor(0x000000, 0);
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
    // ── KOSMAJ POSITION: adjust these to move where the model appears ──
    // x: left(-) / right(+)   y: down(-) / up(+)   z: zoom (bigger number = further)
    camera.position.set(0, -0.2, 6);
    camera.lookAt(-0.09, -0.2, 0);

    // ── Materials ───────────────────────────────────────────────────────────
    const ditherMat = new THREE.ShaderMaterial({
        uniforms: {},
        vertexShader: [
            'varying vec3 vNormal;',
            'void main() {',
            '  vNormal = normalize(normalMatrix * normal);',
            '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
            '}'
        ].join('\n'),
        fragmentShader: [
            'varying vec3 vNormal;',
            '',
            'float bayer(float x, float y) {',
            '  if (y < 1.0) { if (x < 1.0) return 0.0;  if (x < 2.0) return 8.0;  if (x < 3.0) return 2.0;  return 10.0; }',
            '  if (y < 2.0) { if (x < 1.0) return 12.0; if (x < 2.0) return 4.0;  if (x < 3.0) return 14.0; return 6.0;  }',
            '  if (y < 3.0) { if (x < 1.0) return 3.0;  if (x < 2.0) return 11.0; if (x < 3.0) return 1.0;  return 9.0;  }',
            '                 if (x < 1.0) return 15.0; if (x < 2.0) return 7.0;  if (x < 3.0) return 13.0; return 5.0;',
            '}',
            '',
            'void main() {',
            '  vec3  n     = normalize(vNormal);',
            '  float diff  = max(dot(n, normalize(vec3(1.0, 2.0, 1.0))), 0.0);',
            '  float intensity = 0.28 + diff * 0.72;',
            '',
            '  float grid  = 5.0;',
            '  vec2  cell  = floor(gl_FragCoord.xy / grid);',
            '  float thr   = bayer(mod(cell.x, 4.0), mod(cell.y, 4.0)) / 16.0;',
            '  if (intensity < thr) discard;',
            '',
            '  vec2 p = mod(gl_FragCoord.xy, grid) - vec2(grid * 0.5);',
            '  if (length(p) > grid * 0.4) discard;',
            '',
            '  gl_FragColor = vec4(1.0, 0.533, 0.0, 1.0);',
            '}'
        ].join('\n'),
        side: THREE.DoubleSide,
        transparent: true,
    });

    // ── Load GLB ────────────────────────────────────────────────────────────
    const pivot = new THREE.Group();
    scene.add(pivot);

    new GLTFLoader().load(
        'kosmaj.glb',
        function (gltf) {
            var model = gltf.scene;
            model.traverse(function (child) {
                if (child.isMesh) {
                    child.material = ditherMat;
                    if (!child.geometry.attributes.normal) {
                        child.geometry.computeVertexNormals();
                    }
                }
            });

            // Bake all child transforms into geometry so we get true vertex positions
            model.updateMatrixWorld(true);
            model.traverse(function (child) {
                if (child.isMesh) {
                    child.geometry.applyMatrix4(child.matrixWorld);
                    child.position.set(0, 0, 0);
                    child.rotation.set(0, 0, 0);
                    child.scale.set(1, 1, 1);
                    child.updateMatrix();
                }
            });
            // Reset parent transforms too
            model.position.set(0, 0, 0);
            model.rotation.set(0, 0, 0);
            model.scale.set(1, 1, 1);

            // Now compute true center from baked geometry and translate vertices
            var box = new THREE.Box3().setFromObject(model);
            var center = box.getCenter(new THREE.Vector3());
            model.traverse(function (child) {
                if (child.isMesh) {
                    child.geometry.translate(-center.x, -center.y, -center.z);
                }
            });

            // Scale to fit
            box.setFromObject(model);
            var size = box.getSize(new THREE.Vector3());
            model.scale.setScalar(2.4 / Math.max(size.x, size.y, size.z));

            pivot.add(model);
        },
        undefined,
        function (err) { console.error('glb error:', err); }
    );

    // ── Resize ──────────────────────────────────────────────────────────────
    window.addEventListener('resize', function () {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });

    // ── Animate ─────────────────────────────────────────────────────────────
    (function tick() {
        requestAnimationFrame(tick);
        pivot.rotation.y += 0.008;
        renderer.render(scene, camera);
    })();
    </script>
